$kind: collection
description: >-
  API collection for the AutoStream Social-to-Lead Agentic Workflow.


  Flow:

  1. Start with **Health Check** to verify the server is running.

  2. Use **New Chat Session** to start a conversation — copy the `session_id`
  from the response.

  3. Use **Continue Conversation** with the same `session_id` for follow-up
  messages.

  4. Monitor state with **Get Session State**.

  5. View captured leads with **List All Leads**.


  Expected demo conversation:

  - Greeting → pricing inquiry → high intent → name → email → platform → lead
  captured!
variables:
  base_url: http://localhost:8000
  session_id: ""
